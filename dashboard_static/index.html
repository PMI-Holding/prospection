<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GSA Prado — Agent Prospection</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #ffffff;
  --bg2:       #f9fafb;
  --bg3:       #f3f4f6;
  --border:    #e5e7eb;
  --accent:    #2563eb;
  --accent2:   #7c3aed;
  --green:     #10b981;
  --red:       #ef4444;
  --yellow:    #f59e0b;
  --orange:    #f97316;
  --text:      #1f2937;
  --text2:     #6b7280;
  --text3:     #9ca3af;
  --gold:      #d97706;
  --radius:    8px;
  --mono:      'DM Mono', monospace;
  --sans:      'Syne', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
}

/* ── TOP BAR ── */
.topbar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.topbar-logo {
  font-weight: 800;
  font-size: 15px;
  letter-spacing: .04em;
  color: var(--text);
}
.topbar-logo span { color: var(--accent); }
.topbar-actions { display: flex; gap: 10px; align-items: center; }
.badge {
  font-family: var(--mono);
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text2);
}
.badge.online { border-color: var(--green); color: var(--green); }

/* ── TOOLBAR ── */
.toolbar {
  padding: 16px 28px;
  display: flex;
  gap: 10px;
  align-items: center;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.toolbar-btn {
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 600;
  padding: 7px 16px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text);
  cursor: pointer;
  transition: all .15s;
  letter-spacing: .03em;
}
.toolbar-btn:hover { background: var(--border); }
.toolbar-btn.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.toolbar-btn.primary:hover { opacity: .85; }
.search-box {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 12px;
}
.search-box input {
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  width: 200px;
}
.search-box input::placeholder { color: var(--text3); }

/* ── STATS BAR ── */
.statsbar {
  display: flex;
  gap: 1px;
  background: var(--border);
  border-bottom: 1px solid var(--border);
}
.stat {
  flex: 1;
  background: var(--bg2);
  padding: 14px 20px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.stat-val {
  font-size: 22px;
  font-weight: 800;
  color: var(--text);
}
.stat-lbl {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: .08em;
}

/* ── MAIN ── */
.main { padding: 24px 28px; }

/* ── CARDS GRID ── */
.grid {
  display: flex;
  flex-direction: column;
  gap: 0;
}

/* ── CARD ── */
.card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  border-radius: 0;
  overflow: hidden;
  transition: all .2s;
  position: relative;
  cursor: pointer;
}
.card:hover {
  border-color: var(--accent);
  background: var(--bg3);
  transform: none;
}
.card.expanded {
  background: var(--bg2);
}
.card:first-child {
  border-radius: var(--radius) var(--radius) 0 0;
}
.card:last-child {
  border-radius: 0 0 var(--radius) var(--radius);
}
.card-header {
  padding: 12px 16px 8px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
}
.card-company {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.2;
}
.card-sector {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
  margin-top: 3px;
}
.prio-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 4px;
  white-space: nowrap;
  flex-shrink: 0;
}
.prio-forte  { background: rgba(240,192,64,.15); color: var(--gold); border: 1px solid rgba(240,192,64,.3); }
.prio-moyenne{ background: rgba(46,204,142,.1);  color: var(--green);border: 1px solid rgba(46,204,142,.3); }

.card-signal {
  margin: 0 16px 8px;
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 11px;
  line-height: 1.5;
  background: var(--bg3);
  color: var(--text2);
  border-left: 3px solid var(--text3);
}
.card-signal.hot  { border-color: var(--red);    background: rgba(247,86,106,.06); color: var(--text); }
.card-signal.warm { border-color: var(--yellow);  background: rgba(247,201,72,.05); }
.card-signal.cool { border-color: var(--green);   background: rgba(46,204,142,.05); }

/* ── CONTACTS ── */
.contacts {
  padding: 0 16px 8px;
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.contact-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  font-size: 11px;
}
.contact-level {
  font-size: 13px;
  flex-shrink: 0;
  margin-top: 1px;
}
.contact-info { color: var(--text2); line-height: 1.4; }
.contact-info strong { color: var(--text); font-size: 12px; }

/* ── DATA ROW ── */
.datarow {
  display: flex;
  gap: 1px;
  background: var(--border);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  margin: 8px 0 0;
}
.datacell {
  flex: 1;
  background: var(--bg3);
  padding: 8px 10px;
  font-family: var(--mono);
  font-size: 10px;
  text-align: center;
}
.datacell .lbl { color: var(--text3); text-transform: uppercase; font-size: 9px; }
.datacell .val { color: var(--text); font-weight: 500; margin-top: 2px; font-size: 11px; }

/* ── ENRICHMENT STATUS ── */
.enrich-row {
  padding: 6px 16px;
  display: flex;
  gap: 4px;
  align-items: center;
  flex-wrap: wrap;
}
.enrich-tag {
  font-family: var(--mono);
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  display: flex;
  align-items: center;
  gap: 3px;
}
.enrich-tag.found  { background: rgba(46,204,142,.12); color: var(--green); border: 1px solid rgba(46,204,142,.25); }
.enrich-tag.empty  { background: var(--bg3); color: var(--text3); border: 1px solid var(--border); }
.enrich-tag.error  { background: rgba(247,86,106,.1); color: var(--red); border: 1px solid rgba(247,86,106,.2); }

/* ── ODOO STATUS ── */
.odoo-status {
  margin: 0 16px;
  padding: 7px 10px;
  border-radius: 6px;
  font-size: 10px;
  font-family: var(--mono);
  line-height: 1.5;
}
.odoo-status.none    { background: rgba(85,94,120,.1); color: var(--text3); border: 1px solid var(--border); }
.odoo-status.open    { background: rgba(79,142,247,.08); color: var(--accent); border: 1px solid rgba(79,142,247,.2); }
.odoo-status.won     { background: rgba(46,204,142,.08); color: var(--green); border: 1px solid rgba(46,204,142,.2); }
.odoo-status.created { background: rgba(46,204,142,.15); color: var(--green); border: 1px solid var(--green); }
.odoo-status.lost    { background: rgba(247,86,106,.08); color: var(--red); border: 1px solid rgba(247,86,106,.2); }

/* ── CARD ACTIONS ── */
.card-actions {
  padding: 8px 16px 12px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.btn {
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 600;
  padding: 6px 12px;
  border-radius: 5px;
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text2);
  cursor: pointer;
  transition: all .15s;
  display: flex;
  align-items: center;
  gap: 5px;
  letter-spacing: .02em;
}
.btn:hover { border-color: var(--text3); color: var(--text); }
.btn:disabled { opacity: .35; cursor: not-allowed; }
.btn.btn-odoo  { border-color: rgba(79,142,247,.4); color: var(--accent); }
.btn.btn-odoo:hover { background: rgba(79,142,247,.1); }
.btn.btn-zeliq { border-color: rgba(124,106,247,.4); color: var(--accent2); }
.btn.btn-zeliq:hover { background: rgba(124,106,247,.1); }
.btn.btn-create { border-color: rgba(46,204,142,.4); color: var(--green); }
.btn.btn-create:hover { background: rgba(46,204,142,.1); }
.btn.btn-danger { border-color: rgba(247,86,106,.3); color: var(--red); }

/* ── LINKEDIN INPUT ── */
.linkedin-input-wrap {
  padding: 0 16px 12px;
  display: none;
  gap: 8px;
  align-items: center;
}
.linkedin-input-wrap.visible { display: flex; }
.linkedin-input {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--accent2);
  border-radius: 5px;
  padding: 6px 10px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 11px;
  outline: none;
}
.linkedin-input::placeholder { color: var(--text3); }

/* ── LOADING SPINNER ── */
.spinner {
  display: inline-block;
  width: 12px; height: 12px;
  border: 2px solid currentColor;
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin .6s linear infinite;
  opacity: .7;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── TOAST ── */
#toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 18px;
  font-size: 13px;
  color: var(--text);
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
  transform: translateY(20px);
  opacity: 0;
  transition: all .25s;
  z-index: 1000;
  max-width: 360px;
}
#toast.show { transform: none; opacity: 1; }
#toast.success { border-color: var(--green); }
#toast.error   { border-color: var(--red); }

/* ── FILTER TABS ── */
.filter-tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 18px;
}
.tab {
  font-size: 11px;
  font-weight: 600;
  padding: 5px 12px;
  border-radius: 5px;
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text3);
  cursor: pointer;
  transition: all .15s;
  letter-spacing: .04em;
  text-transform: uppercase;
}
.tab:hover { color: var(--text); }
.tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ── ACTU PANEL ── */
.actu-panel {
  display: none;
  padding: 10px 16px 12px;
  font-size: 11px;
  color: var(--text2);
  line-height: 1.6;
  border-top: 1px solid var(--border);
}
.actu-panel.visible { display: block; }

/* ── EMPTY STATE ── */
.empty { text-align: center; padding: 80px 20px; color: var(--text3); }
.empty-icon { font-size: 48px; margin-bottom: 16px; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-logo">GSA<span>PRADO</span> · Agent Prospection</div>
  <div class="topbar-actions">
    <span class="badge" id="odoo-badge">Odoo…</span>
    <span class="badge" id="count-badge">— fiches</span>
  </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <button class="toolbar-btn" onclick="loadRows()">🔄 Rafraîchir</button>
  <button class="toolbar-btn primary" onclick="checkAllOdoo()">⚡ Vérifier tout Odoo</button>
  <div class="search-box">
    <span style="color:var(--text3);font-size:13px">🔍</span>
    <input type="text" placeholder="Rechercher une société…" oninput="filterCards(this.value)" />
  </div>
</div>

<!-- STATS -->
<div class="statsbar" id="statsbar">
  <div class="stat"><div class="stat-val" id="s-total">—</div><div class="stat-lbl">Sociétés</div></div>
  <div class="stat"><div class="stat-val" id="s-forte" style="color:var(--gold)">—</div><div class="stat-lbl">Priorité forte</div></div>
  <div class="stat"><div class="stat-val" id="s-odoo" style="color:var(--accent)">—</div><div class="stat-lbl">Dans Odoo</div></div>
  <div class="stat"><div class="stat-val" id="s-enrichi" style="color:var(--green)">—</div><div class="stat-lbl">Enrichis Zeliq</div></div>
  <div class="stat"><div class="stat-val" id="s-sans" style="color:var(--red)">—</div><div class="stat-lbl">Sans opportunité</div></div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="filter-tabs">
    <div class="tab active" onclick="setFilter('all',this)">Tous</div>
    <div class="tab" onclick="setFilter('forte',this)">⭐⭐⭐ Forte priorité</div>
    <div class="tab" onclick="setFilter('no-odoo',this)">⚪ Sans opportunité</div>
    <div class="tab" onclick="setFilter('no-zeliq',this)">❓ Non enrichis</div>
  </div>
  <div class="grid" id="grid">
    <div class="empty"><div class="empty-icon">📊</div>Chargement…</div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
const API = 'http://localhost:5000/api';
let allRows = [];
let currentFilter = 'all';

// ── Toast ─────────────────────────────────────────────────────────────────
function toast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `show ${type}`;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.className = '', 3000);
}

// ── Load rows ─────────────────────────────────────────────────────────────
async function loadRows() {
  try {
    const res = await fetch(`${API}/rows`);
    allRows = await res.json();
    updateStats();
    renderCards(allRows);
    document.getElementById('odoo-badge').textContent = 'Odoo ✅';
    document.getElementById('odoo-badge').className   = 'badge online';
  } catch(e) {
    document.getElementById('grid').innerHTML =
      '<div class="empty"><div class="empty-icon">❌</div>Impossible de joindre le serveur.<br>Lancez : python dashboard_server.py</div>';
  }
}

// ── Stats ─────────────────────────────────────────────────────────────────
function updateStats() {
  const total   = allRows.length;
  const forte   = allRows.filter(r => r.priorite.includes('FORTE')).length;
  const inOdoo  = allRows.filter(r => r.odoo && !r.odoo.includes('⚪')).length;
  const enrichi = allRows.filter(r => r.email && !r.email.includes('Non') && r.email.includes('@')).length;
  const sans    = allRows.filter(r => !r.odoo || r.odoo.includes('⚪')).length;
  document.getElementById('s-total').textContent   = total;
  document.getElementById('s-forte').textContent   = forte;
  document.getElementById('s-odoo').textContent    = inOdoo;
  document.getElementById('s-enrichi').textContent = enrichi;
  document.getElementById('s-sans').textContent    = sans;
  document.getElementById('count-badge').textContent = `${total} fiches`;
}

// ── Filter ────────────────────────────────────────────────────────────────
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  applyFilter();
}
function filterCards(q) {
  applyFilter(q);
}
function applyFilter(q='') {
  const query = q.toLowerCase();
  let rows = allRows;
  if (currentFilter === 'forte')   rows = rows.filter(r => r.priorite.includes('FORTE'));
  if (currentFilter === 'no-odoo') rows = rows.filter(r => !r.odoo || r.odoo.includes('⚪'));
  if (currentFilter === 'no-zeliq')rows = rows.filter(r => !r.email || !r.email.includes('@'));
  if (query) rows = rows.filter(r =>
    r.entreprise.toLowerCase().includes(query) ||
    r.secteur.toLowerCase().includes(query) ||
    r.dg.toLowerCase().includes(query));
  renderCards(rows);
}

// ── Signal class ──────────────────────────────────────────────────────────
function signalClass(signal) {
  if (signal.includes('🔴')) return 'hot';
  if (signal.includes('🟡')) return 'warm';
  return 'cool';
}
function odooClass(odoo) {
  if (!odoo || odoo.includes('⚪'))   return 'none';
  if (odoo.includes('🟢'))           return 'won';
  if (odoo.includes('🔵'))           return 'open';
  if (odoo.includes('🆕'))           return 'created';
  if (odoo.includes('🔴'))           return 'lost';
  return 'none';
}

// ── Render cards ──────────────────────────────────────────────────────────
function renderCards(rows) {
  const grid = document.getElementById('grid');
  if (!rows.length) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div>Aucune fiche correspondante</div>';
    return;
  }
  grid.innerHTML = rows.map(r => cardHTML(r)).join('');
}

function cardHTML(r) {
  const prioClass = r.priorite.includes('FORTE') ? 'prio-forte' : 'prio-moyenne';
  const prioLabel = r.priorite.includes('FORTE') ? '⭐⭐⭐ FORTE' : '⭐⭐ MOYENNE';
  const dgLines   = r.dg  ? r.dg.split('\n')  : [];
  const dafLines  = r.daf ? r.daf.split('\n') : [];
  const dgName    = dgLines[0]  || '';
  const dgTitle   = dgLines[1]  || '';
  const dafName   = dafLines[0] || '';
  const dafTitle  = dafLines[1] || '';

  const phoneTag  = r.phone && !r.phone.includes('Non')
    ? `<span class="enrich-tag found">📞 ${r.phone}</span>`
    : `<span class="enrich-tag empty">📞 —</span>`;
  const emailTag  = r.email && r.email.includes('@')
    ? `<span class="enrich-tag found">📧 ${r.email}</span>`
    : `<span class="enrich-tag empty">📧 —</span>`;
  const liTag     = r.linkedin
    ? `<span class="enrich-tag found">🔗 LinkedIn ✓</span>`
    : `<span class="enrich-tag empty">🔗 LinkedIn</span>`;

  const odooTxt   = r.odoo || '⚪ Aucune opportunité';
  const odooShort = odooTxt.split('\n')[0];

  return `
<div class="card" id="card-${r.row}">
  <div class="card-header">
    <div>
      <div class="card-company">${r.entreprise.split('\n')[0]}</div>
      <div class="card-sector">${r.secteur.split(' – ')[0] || r.secteur}</div>
    </div>
    <span class="prio-badge ${prioClass}">${prioLabel}</span>
  </div>

  <div class="card-signal ${signalClass(r.signal)}">
    ${r.signal.replace(/\n/g,'<br>')}
  </div>

  <div class="contacts">
    ${dgName ? `<div class="contact-row">
      <span class="contact-level">🥇</span>
      <div class="contact-info"><strong>${dgName}</strong>${dgTitle ? '<br>'+dgTitle : ''}</div>
    </div>` : '<div class="contact-row"><span class="contact-level">🥇</span><div class="contact-info" style="color:var(--text3)">Décideur final à identifier</div></div>'}
    ${dafName ? `<div class="contact-row">
      <span class="contact-level">🥈</span>
      <div class="contact-info"><strong>${dafName}</strong>${dafTitle ? '<br>'+dafTitle : ''}</div>
    </div>` : ''}
  </div>

  <div class="datarow">
    <div class="datacell"><div class="lbl">CA</div><div class="val">${r.ca || '—'} M€</div></div>
    <div class="datacell"><div class="lbl">Ville</div><div class="val">${r.ville.split('\n')[0] || '—'}</div></div>
  </div>

  <div class="odoo-status ${odooClass(r.odoo)}" style="margin-top:10px">
    ${odooShort}
  </div>

  <div class="enrich-row">
    ${phoneTag}${emailTag}${liTag}
  </div>

  <!-- LinkedIn input (toggle) -->
  <div class="linkedin-input-wrap" id="li-wrap-${r.row}">
    <input class="linkedin-input" id="li-input-${r.row}"
           placeholder="https://linkedin.com/in/prenom-nom" />
    <button class="btn btn-zeliq" onclick="saveLinkedinAndEnrich(${r.row})">⚡ Enrichir</button>
    <button class="btn" onclick="toggleLinkedin(${r.row})">✕</button>
  </div>

  <!-- Actualité toggle -->
  <div class="actu-panel" id="actu-${r.row}">
    <strong style="color:var(--text);font-size:11px">📰 Actualité & sources</strong><br><br>
    ${(r.actu || 'Aucune actualité renseignée.').replace(/\n/g,'<br>')}
  </div>

  <div class="card-actions">
    <button class="btn btn-odoo" id="btn-odoo-${r.row}" onclick="checkOdoo(${r.row})">
      🔵 Vérifier Odoo
    </button>
    <button class="btn btn-zeliq" onclick="enrichZeliq(${r.row})" id="btn-zeliq-${r.row}">
      ⚡ Zeliq
    </button>
    <button class="btn" onclick="toggleLinkedin(${r.row})">
      🔗 LinkedIn
    </button>
    ${!r.odoo || r.odoo.includes('⚪') ? `
    <button class="btn btn-create" id="btn-create-${r.row}" onclick="createLead(${r.row})">
      ➕ Créer Odoo
    </button>` : ''}
    <button class="btn" onclick="toggleActu(${r.row})" style="margin-left:auto">
      📰 Actu
    </button>
  </div>
</div>`;
}

// ── Actions ───────────────────────────────────────────────────────────────
async function checkOdoo(row) {
  const btn = document.getElementById(`btn-odoo-${row}`);
  btn.innerHTML = '<span class="spinner"></span> Vérification…';
  btn.disabled  = true;
  try {
    const res  = await fetch(`${API}/odoo/check/${row}`, {method:'POST'});
    const data = await res.json();
    toast(`Odoo : ${data.text.split('\n')[0]}`, data.status==='none'?'':'success');
    await loadRows();
  } catch(e) {
    toast('Erreur Odoo : ' + e.message, 'error');
  }
  btn.innerHTML = '🔵 Vérifier Odoo';
  btn.disabled  = false;
}

async function checkAllOdoo() {
  toast('Vérification Odoo en cours pour toutes les fiches…');
  for (const r of allRows) {
    await fetch(`${API}/odoo/check/${r.row}`, {method:'POST'});
    await new Promise(res => setTimeout(res, 300));
  }
  await loadRows();
  toast('✅ Vérification Odoo terminée !');
}

async function enrichZeliq(row) {
  const btn = document.getElementById(`btn-zeliq-${row}`);
  btn.innerHTML = '<span class="spinner"></span> Enrichissement…';
  btn.disabled  = true;
  try {
    const res  = await fetch(`${API}/zeliq/enrich/${row}`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({})
    });
    const data = await res.json();
    if (data.status === 'missing') {
      toast('⚠️ Collez une URL LinkedIn via le bouton 🔗', 'error');
      toggleLinkedin(row);
    } else {
      const msg = `📞 ${data.phone||'—'}  |  📧 ${data.email||'—'}`;
      toast(msg, data.status==='ok'?'success':'');
      await loadRows();
    }
  } catch(e) {
    toast('Erreur Zeliq : ' + e.message, 'error');
  }
  btn.innerHTML = '⚡ Zeliq';
  btn.disabled  = false;
}

async function saveLinkedinAndEnrich(row) {
  const url = document.getElementById(`li-input-${row}`).value.trim();
  if (!url || !url.includes('linkedin.com')) {
    toast('URL LinkedIn invalide', 'error'); return;
  }
  const btn = document.querySelector(`#li-wrap-${row} .btn-zeliq`);
  btn.innerHTML = '<span class="spinner"></span>';
  btn.disabled  = true;
  try {
    await fetch(`${API}/linkedin/${row}`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({linkedin: url})
    });
    const res  = await fetch(`${API}/zeliq/enrich/${row}`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({linkedin: url})
    });
    const data = await res.json();
    toast(`📞 ${data.phone||'—'}  |  📧 ${data.email||'—'}`,
          data.status==='ok'?'success':'');
    toggleLinkedin(row);
    await loadRows();
  } catch(e) {
    toast('Erreur : ' + e.message, 'error');
  }
  btn.innerHTML = '⚡ Enrichir';
  btn.disabled  = false;
}

async function createLead(row) {
  const btn = document.getElementById(`btn-create-${row}`);
  if (!btn) return;
  if (!confirm('Créer ce lead dans Odoo CRM ?')) return;
  btn.innerHTML = '<span class="spinner"></span>';
  btn.disabled  = true;
  try {
    const res  = await fetch(`${API}/odoo/create/${row}`, {method:'POST'});
    const data = await res.json();
    if (data.lead_id) {
      toast(`✅ Lead créé (ID:${data.lead_id})`, 'success');
      window.open(data.url, '_blank');
      await loadRows();
    } else {
      toast('Erreur : ' + (data.error || 'inconnue'), 'error');
    }
  } catch(e) {
    toast('Erreur Odoo : ' + e.message, 'error');
  }
}

function toggleLinkedin(row) {
  const wrap = document.getElementById(`li-wrap-${row}`);
  wrap.classList.toggle('visible');
  if (wrap.classList.contains('visible'))
    document.getElementById(`li-input-${row}`).focus();
}
function toggleActu(row) {
  document.getElementById(`actu-${row}`).classList.toggle('visible');
}

// ── Init ──────────────────────────────────────────────────────────────────
loadRows();
</script>
</body>
</html>
